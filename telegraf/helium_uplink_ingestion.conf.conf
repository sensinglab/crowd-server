# TELEGRAF – CHIRPSTACK / HELIUM UPLINK INGESTION

[agent]
  interval = "10s"
  round_interval = true
  flush_interval = "10s"
  flush_jitter = "0s"
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  omit_hostname = true
  debug = true

# NUMDETECTIONS
[[inputs.mqtt_consumer]]
  name_override = "numdetections"
  servers = ["tcp://localhost:1883"]
  topics  = ["chirpstack/uplink/+/detections"]

  username = "YOUR_MQTT_USERNAME"
  password = "YOUR_MQTT_PASSWORD"

  data_format = "json_v2"

  [inputs.mqtt_consumer.tags]
    source     = "helium"
    technology = "lorawan"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "deviceInfo.deviceName"
      rename = "device_id"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "object.count"
      rename = "count"

# SENSOR LOCATION
[[inputs.mqtt_consumer]]
  name_override = "sensorLocation"
  servers = ["tcp://localhost:1883"]
  topics  = ["chirpstack/uplink/+/location"]

  username = "YOUR_MQTT_USERNAME"
  password = "YOUR_MQTT_PASSWORD"

  data_format = "json_v2"

  [inputs.mqtt_consumer.tags]
    source     = "helium"
    technology = "lorawan"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "deviceInfo.deviceName"
      rename = "device_id"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "object.latitude"
      rename = "lat"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "object.longitude"
      rename = "lon"

# Device ID fallback via topic
[[processors.regex]]
  tagpass = { source = ["helium"] }

  [[processors.regex.tags]]
    key         = "mqtt_topic"
    pattern     = "chirpstack/uplink/([^/]+)/"
    replacement = "${1}"
    result_key  = "device_id"

# Bucket Router via PostgreSQL
[[processors.execd]]
  tagpass = { source = ["helium"] }
  command = ["/usr/local/bin/influx_bucket_router.py"]
  environment = [
    "PG_DSN=host=127.0.0.1 dbname=YOUR_DB user=YOUR_DB_USER password=YOUR_DB_PASSWORD sslmode=disable"
  ]

[[outputs.influxdb_v2]]
  tagpass = { source = ["helium"] }

  urls         = ["http://localhost:8086"]
  token        = "YOUR_INFLUX_TOKEN"
  organization = "YOUR_INFLUX_ORG"
  bucket       = "Bucket_Default"
  bucket_tag   = "bucket"
  exclude_bucket_tag = true